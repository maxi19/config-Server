spring:
  application:
    name: admin-service
  boot:
    admin:
      discovery:
        ignored-services: "admin-service"
  cloud:
      config:
        profile: dev
eureka:
  instance:
    # Fuerza a que se registren por IP, que es lo más estable en redes de Docker
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
server:
  forward-headers-strategy: framework
  port: "8084"