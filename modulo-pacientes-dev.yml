spring:
  application:
    name: modulo-pacientes
  cloud:
    config:
      profile: dev
  h2:
    console:
      enabled: true

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: 'true'
    hibernate:
      ddl-auto: update
  devtools:
      restart:
        enabled: 'false'
  boot:
    admin:
      client:
        url: http://localhost:8084
  management:
      endpoints:
        web:
          exposure:
            include: "*"

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
  client:
    service-url:
        defaultZone: http://localhost:8761/eureka/
    enabled: true

server:
  forward-headers-strategy: framework
  port: "8082"
 