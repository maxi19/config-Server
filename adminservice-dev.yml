spring:
  application:
    name: adminservice
  cloud:
      config:
        profile: dev
  security:
    user:
      name: adminUser
      password: adminPassword123
eureka:
  instance:
    # Fuerza a que se registren por IP, que es lo más estable en redes de Docker
    prefer-ip-address: false
    hostname: localhost
    instance-id: ${spring.application.name}:${random.uuid}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eurekaUser:eurekaPassword123@localhost:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: "*" # Expone todos los endpoints (health, info, etc.) para el Admin
  endpoint:
    health:
      show-details: always
server:
  forward-headers-strategy: framework
  port: "8084"