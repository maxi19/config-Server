spring:
  application:
    name: modulo-atenciones
  cloud:
    config:
      profile: dev
      uri: http://configUser:configPassword123@localhost:8888
  h2:
    console:
      enabled: true

  datasource:
    url: jdbc:h2:mem:atencionesdb;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: 'true'
    hibernate:
      ddl-auto: update
  devtools:
    restart:
      enabled: 'false'
  boot:
     admin:
       client:
         url: http://localhost:8084
         username: adminUser
         password: adminPassword123
  management:
    endpoints:
      web:
        exposure:
          include: "*"
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
  client:
    service-url:
        defaultZone: http://eurekaUser:eurekaPassword123@localhost:8761/eureka/
    enabled: true

server:
    port: '8081'
    forward-headers-strategy: framework