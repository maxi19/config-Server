spring:
  application:
    name: modulo-pacientes
  cloud:
    config:
     profile: prod
  h2:
    console:
      enabled: true

  datasource:
    url: jdbc:mysql://db:3306/hospitaldb
    username: admin
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: 'true'
  devtools:
    restart:
      enabled: 'false'
  boot:
    admin:
      client:
        url: http://admin-service:8084

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
  client:
    service-url:
        defaultZone: http://eurekaserver:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,beans,loggers

server:
  forward-headers-strategy: framework
  port: 8082